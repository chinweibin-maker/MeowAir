<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowAir Ultra | 喵准航空：全链路决策系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --m-orange: #ff9f43; --m-blue: #0984e3; --m-dark: #2d3436;
            --m-gray: #f1f2f6; --m-white: #ffffff; --m-green: #00b894;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; margin: 0; color: var(--m-dark); }
        
        /* 导航与状态 */
        nav { background: var(--m-dark); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; color: var(--m-orange); }
        .logo span { color: white; }

        .container { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 380px 1fr; gap: 20px; padding: 0 20px; }

        /* 侧边栏：核心搜索逻辑 */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .trip-type { display: flex; background: var(--m-gray); border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; transition: 0.3s; }
        .type-btn.active { background: white; color: var(--m-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid var(--m-gray); border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--m-blue); }

        /* 时间线可视化 */
        .timeline { position: relative; padding: 20px 0; margin-left: 20px; border-left: 2px dashed #ddd; }
        .timeline-item { position: relative; margin-bottom: 15px; padding-left: 25px; font-size: 13px; }
        .timeline-item::before { content: ""; position: absolute; left: -7px; top: 5px; width: 12px; height: 12px; background: var(--m-blue); border-radius: 50%; }

        /* 航班结果卡片 */
        .flight-res-card { 
            display: grid; grid-template-columns: 1fr 150px 120px; gap: 20px;
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            border: 2px solid transparent; transition: 0.3s; cursor: pointer;
        }
        .flight-res-card:hover { border-color: var(--m-orange); transform: translateY(-3px); }
        .flight-main { display: flex; align-items: center; gap: 20px; }
        .airline-box { width: 100px; font-weight: 800; color: var(--m-blue); }
        .time-box { text-align: center; }
        .time-box b { font-size: 18px; display: block; }
        .price-box { text-align: right; border-left: 1px solid #eee; padding-left: 20px; }
        .price-val { font-size: 24px; font-weight: 900; color: var(--m-orange); }

        .btn-hunt { width: 100%; padding: 15px; background: var(--m-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* 猫咪状态 */
        .meow-status { background: #fff5e6; border-radius: 15px; padding: 15px; text-align: center; margin-top: 20px; border: 1px solid #ffeaa7; }
        #cat-icon { font-size: 40px; margin-bottom: 10px; display: block; }

        /* 隐藏的详情页 */
        .details-overlay { display: none; margin-top: 10px; background: #fafafa; border-radius: 10px; padding: 15px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">MEOW<span>AIR</span> ULTRA v5.0</div>
    <div id="sys-time">2026-04-03 21:04</div>
</nav>

<div class="container">
    <aside>
        <div class="card">
            <div class="trip-type">
                <button class="type-btn active" onclick="setTripType('single', this)">单程</button>
                <button class="type-btn" onclick="setTripType('round', this)">往返</button>
            </div>
            
            <div class="input-group">
                <label>出发地 (Origin)</label>
                <input type="text" id="from" value="Kuala Lumpur (KUL)">
            </div>
            <div class="input-group">
                <label>目的地 (Destination)</label>
                <input type="text" id="to" value="Shanghai (PVG)">
            </div>
            <div class="input-group">
                <label>去程日期</label>
                <input type="date" id="depart-date" value="2026-04-10">
            </div>
            <div class="input-group" id="return-group" style="display:none;">
                <label>回程日期</label>
                <input type="date" id="return-date" value="2026-04-17">
            </div>
            
            <button class="btn-hunt" onclick="searchFlights()">启动全网数据挖掘</button>
        </div>

        <div class="meow-status">
            <span id="cat-icon">🐱</span>
            <div id="cat-talk" style="font-size:12px; color:#d35400;">“主人，正在待命。需要找往返票吗？”</div>
        </div>
    </aside>

    <main>
        <div class="card" style="height: 250px;">
            <canvas id="priceChart"></canvas>
        </div>

        <div id="flight-list">
            <div style="text-align:center; padding:50px; color:#999;">点击搜索，喵咪为你规划完整时间线...</div>
        </div>
    </main>
</div>

<script>
    let isRoundTrip = false;
    let chart;

    function setTripType(type, btn) {
        isRoundTrip = (type === 'round');
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('return-group').style.display = isRoundTrip ? 'block' : 'none';
        document.getElementById('cat-talk').innerText = isRoundTrip ? "“往返票更划算喵！正在优化回程路线...”" : "“单程轻装上阵喵！”";
    }

    function searchFlights() {
        const list = document.getElementById('flight-list');
        const icon = document.getElementById('cat-icon');
        icon.innerText = "🔍";
        list.innerHTML = "<div style='text-align:center; padding:50px;'>正在拦截 GDS 实时数据包...</div>";

        setTimeout(() => {
            icon.innerText = "😻";
            const mockData = [
                { airline: "AirAsia", price: 820, roundPrice: 1550, time: "08:30 - 14:00", dur: "5h 30m" },
                { airline: "Trip.com", price: 799, roundPrice: 1480, time: "10:20 - 15:50", dur: "5h 30m" }
            ];

            list.innerHTML = mockData.map(f => `
                <div class="flight-res-card" onclick="toggleDetails(this)">
                    <div class="flight-main">
                        <div class="airline-box">${f.airline}</div>
                        <div class="time-box">
                            <b>${f.time}</b>
                            <small>${f.dur} | 直飞</small>
                        </div>
                    </div>
                    <div style="text-align:center; color:var(--m-green); font-size:12px;">
                        ${isRoundTrip ? '🔄 往返含税' : '➡️ 单程含税'}
                    </div>
                    <div class="price-box">
                        <div class="price-val">RM ${isRoundTrip ? f.roundPrice : f.price}</div>
                        <button style="font-size:10px; background:var(--m-dark); color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">详情</button>
                    </div>
                    <div class="details-overlay">
                        <div class="timeline">
                            <div class="timeline-item"><b>06:30</b> 抵达吉隆坡机场 (建议值机)</div>
                            <div class="timeline-item"><b>07:45</b> 停止登机</div>
                            <div class="timeline-item"><b>08:30</b> 跑道起飞 (航班号 AK520)</div>
                            <div class="timeline-item"><b>14:00</b> 抵达上海浦东 T2</div>
                            ${isRoundTrip ? '<div class="timeline-item" style="color:var(--m-orange)"><b>[返程预告]</b> 7天后 09:00 起飞返回</div>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            updateChart();
        }, 1200);
    }

    function toggleDetails(card) {
        const details = card.querySelector('.details-overlay');
        details.style.display = (details.style.display === 'block') ? 'none' : 'block';
    }

    function updateChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['前天', '昨天', '今天', '明天', '后天'],
                datasets: [{
                    label: isRoundTrip ? '往返价格趋势' : '单程价格趋势',
                    data: [1600, 1550, 1480, 1700, 1850],
                    borderColor: '#ff9f43',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(255,159,67,0.1)'
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    window.onload = updateChart;
</script>
</body>
</html>
