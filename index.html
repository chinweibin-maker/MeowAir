<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowAir Ultra v6.0 | 动态比价与时间线系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --m-orange: #ff9f43; --m-blue: #0984e3; --m-dark: #2d3436; --m-bg: #f8f9fa; --m-green: #00b894; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--m-bg); margin: 0; color: var(--m-dark); }
        
        /* Header */
        nav { background: var(--m-dark); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; color: var(--m-orange); text-decoration: none; }
        .logo span { color: white; }

        .wrapper { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 380px 1fr; gap: 20px; padding: 0 20px; }

        /* Sidebar Control */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .trip-selector { display: flex; background: #eee; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; transition: 0.3s; }
        .t-btn.active { background: white; color: var(--m-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .input-row { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #999; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--m-blue); outline: none; background: #f0f7ff; }

        /* Flight Results */
        .flight-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s; border: 2px solid transparent; }
        .flight-card:hover { border-color: var(--m-orange); transform: translateY(-3px); }
        .flight-header { display: grid; grid-template-columns: 1fr 180px 140px; align-items: center; cursor: pointer; }
        .airline { font-weight: 800; color: var(--m-blue); font-size: 18px; }
        .route-info { text-align: center; }
        .route-info b { font-size: 20px; display: block; }
        .price-section { text-align: right; border-left: 1px solid #eee; padding-left: 20px; }
        .price-text { font-size: 26px; font-weight: 900; color: var(--m-orange); }

        /* 核心功能：时间线 (Timeline) */
        .itinerary { display: none; padding: 20px; background: #fafafa; border-radius: 15px; margin-top: 15px; border-top: 1px dashed #ddd; animation: slideDown 0.3s ease; }
        .step { position: relative; padding-left: 30px; margin-bottom: 15px; font-size: 13px; }
        .step::before { content: ""; position: absolute; left: 0; top: 0; width: 12px; height: 12px; border-radius: 50%; background: var(--m-blue); border: 3px solid white; box-shadow: 0 0 0 2px var(--m-blue); }
        .step::after { content: ""; position: absolute; left: 8px; top: 15px; width: 2px; height: 100%; background: #ddd; }
        .step:last-child::after { display: none; }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-search { width: 100%; padding: 15px; background: var(--m-blue); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 16px; box-shadow: 0 5px 15px rgba(9, 132, 227, 0.3); }
        .btn-search:active { transform: scale(0.98); }

        .badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-right: 5px; }
        .bg-green { background: #e6fffa; color: #00b894; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">MEOW<span>AIR</span> ULTRA v6.0</a>
    <div style="font-size: 12px;">实时汇率: 1 CNY ≈ 0.65 MYR</div>
</nav>

<div class="wrapper">
    <aside>
        <div class="card">
            <div class="trip-selector">
                <button class="t-btn active" onclick="switchMode('oneWay', this)">单程 (One-way)</button>
                <button class="t-btn" onclick="switchMode('roundTrip', this)">往返 (Round-trip)</button>
            </div>
            
            <div class="input-row">
                <label>出发地</label>
                <input type="text" id="from" value="Kuala Lumpur (KUL)">
            </div>
            <div class="input-row">
                <label>目的地</label>
                <input type="text" id="to" value="Shanghai (PVG)">
            </div>
            <div class="input-row">
                <label>出发日期</label>
                <input type="date" id="dDate" value="2026-04-10" onchange="triggerUpdate()">
            </div>
            <div class="input-row" id="returnRow" style="display:none;">
                <label>返程日期</label>
                <input type="date" id="rDate" value="2026-04-17" onchange="triggerUpdate()">
            </div>
            
            <button class="btn-search" onclick="performSearch()">🚀 拦截实时报价</button>
        </div>

        <div class="card" style="text-align: center; background: #fff5e6; border: 1px dashed var(--m-orange);">
            <span id="cat-avatar" style="font-size:50px;">🐱</span>
            <p id="cat-speech" style="font-size:12px; color:#d35400;">“主人，日期变动会导致价格波动喵！”</p>
        </div>
    </aside>

    <main>
        <div class="card" style="height: 280px;">
            <canvas id="priceChart"></canvas>
        </div>

        <div id="results-list">
            <div style="text-align:center; padding:100px; color:#ccc;">
                <i class="fas fa-plane-departure" style="font-size:40px; margin-bottom:15px;"></i>
                <p>输入行程并启动拦截系统...</p>
            </div>
        </div>
    </main>
</div>

<script>
    let currentMode = 'oneWay';
    let chart;

    // 切换模式逻辑
    function switchMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('returnRow').style.display = (mode === 'roundTrip') ? 'block' : 'none';
        triggerUpdate();
    }

    // 模拟 BIS 价格算法：基于日期和目的地产生随机但合理的波动
    function calculatePrice(base, seed) {
        const dateFactor = new Date(document.getElementById('dDate').value).getDate();
        // 伪随机算法：让价格随日期变化
        let price = base + (seed * (dateFactor % 5) * 50) - (Math.random() * 20);
        return Math.floor(currentMode === 'roundTrip' ? price * 1.85 : price);
    }

    function triggerUpdate() {
        document.getElementById('cat-speech').innerText = "“检测到参数变化，重新计算最优价格线喵！”";
        document.getElementById('cat-avatar').innerText = "🧐";
    }

    function performSearch() {
        const list = document.getElementById('results-list');
        const speech = document.getElementById('cat-speech');
        const avatar = document.getElementById('cat-avatar');

        avatar.innerText = "🔍";
        speech.innerText = "正在穿透 GDS 全球分销系统数据包...";
        list.innerHTML = "<div style='text-align:center; padding:50px;'><i class='fas fa-sync fa-spin'></i> 正在获取实时 Seat Map...</div>";

        setTimeout(() => {
            avatar.innerText = "😼";
            speech.innerText = currentMode === 'roundTrip' ? "“已锁定最省钱的往返组合喵！”" : "“单程最低价已就绪！”";
            
            const providers = [
                { name: "Trip.com", base: 780, seed: 1.2, tags: ["含20kg托运", "极速退改"] },
                { name: "AirAsia", base: 820, seed: 0.8, tags: ["廉航之王", "机上有WiFi"] },
                { name: "MAS", base: 1100, seed: 2.1, tags: ["五星全服务", "马来西亚国航"] }
            ];

            const pricesForChart = [];

            list.innerHTML = providers.map(p => {
                const finalPrice = calculatePrice(p.base, p.seed);
                pricesForChart.push(finalPrice);
                return `
                <div class="flight-card">
                    <div class="flight-header" onclick="toggleTimeline(this)">
                        <div class="airline">${p.name}</div>
                        <div class="route-info">
                            <b>08:30 — 14:00</b>
                            <span class="badge bg-green">直飞 5h 30m</span>
                        </div>
                        <div class="price-section">
                            <div class="price-text">RM ${finalPrice}</div>
                            <small style="color:#999; font-size:10px;">${currentMode === 'roundTrip' ? '含回程总计' : '单程全含'}</small>
                        </div>
                    </div>
                    <div class="itinerary">
                        <div class="step"><b>06:30</b> 抵达 KUL T2 航站楼进行值机</div>
                        <div class="step"><b>08:30</b> 航班起飞 (代码: MEOW520)</div>
                        <div class="step"><b>11:00</b> 飞行中：提供猫咪主题餐食 (模拟)</div>
                        <div class="step"><b>14:00</b> 降落上海浦东 (PVG) T2</div>
                        ${currentMode === 'roundTrip' ? `<div class="step" style="color:var(--m-orange)"><b>[回程计划]</b> 7天后 09:00 原路返回</div>` : ''}
                    </div>
                </div>`;
            }).join('');
            
            updateChart(pricesForChart);
        }, 1500);
    }

    function toggleTimeline(header) {
        const itin = header.nextElementSibling;
        itin.style.display = (itin.style.display === 'block') ? 'none' : 'block';
    }

    function updateChart(prices) {
        const ctx = document.getElementById('priceChart').getContext('2d');
        if(chart) chart.destroy();
        
        // 模拟过去几天的趋势
        const history = prices.map(p => [p+150, p+80, p+200, p]);
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['3天前', '2天前', '昨天', '今天'],
                datasets: [{
                    label: '实时动态报价走势 (RM)',
                    data: history[0],
                    borderColor: '#ff9f43',
                    backgroundColor: 'rgba(255, 159, 67, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // 初始化加载
    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dDate').value = today;
        updateChart([900, 850, 1100, 780]);
    };
</script>
</body>
</html>
