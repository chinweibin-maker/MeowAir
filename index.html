<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowAir Ultra v7.0 | 全球 GDS 实时指挥系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --m-orange: #ff9f43; --m-blue: #0984e3; --m-dark: #2d3436; --m-bg: #f4f7f6; --m-green: #00b894; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--m-bg); margin: 0; color: var(--m-dark); }
        
        /* 导航栏 */
        nav { background: var(--m-dark); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; color: var(--m-orange); text-decoration: none; }
        .logo span { color: white; }
        .fx-rate { font-size: 11px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 15px; }

        .wrapper { max-width: 1500px; margin: 20px auto; display: grid; grid-template-columns: 380px 1fr; gap: 25px; padding: 0 20px; }

        /* 侧边控制台 */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .trip-mode { display: flex; background: #eee; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .t-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; transition: 0.3s; }
        .t-btn.active { background: white; color: var(--m-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .input-box { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #999; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        input:focus { border-color: var(--m-blue); outline: none; background: #f0f7ff; }

        /* 航班结果 */
        .flight-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 2px solid transparent; transition: 0.3s; }
        .flight-card:hover { border-color: var(--m-orange); transform: translateX(5px); }
        .f-header { display: grid; grid-template-columns: 120px 1fr 150px 130px; align-items: center; cursor: pointer; }
        .airline-name { font-weight: 800; color: var(--m-blue); font-size: 18px; }
        .price-tag { text-align: right; border-left: 1px solid #eee; padding-left: 20px; }
        .price-val { font-size: 28px; font-weight: 900; color: var(--m-orange); }

        /* 核心：动态时间轴 */
        .timeline { display: none; margin-top: 20px; padding: 20px; background: #fdfdfd; border-radius: 15px; border: 1px dashed #ddd; animation: fadeIn 0.4s ease; }
        .step { position: relative; padding-left: 30px; margin-bottom: 15px; font-size: 13px; color: #555; }
        .step::before { content: ""; position: absolute; left: 0; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: var(--m-blue); border: 3px solid white; box-shadow: 0 0 0 2px var(--m-blue); }
        .step::after { content: ""; position: absolute; left: 8px; top: 18px; width: 2px; height: 100%; background: #eee; }
        .step:last-child::after { display: none; }

        /* 外部比价链接按钮组 */
        .links-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .ext-link { font-size: 11px; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #666; transition: 0.3s; }
        .ext-link:hover { background: var(--m-blue); color: white; border-color: var(--m-blue); }

        .btn-hunt { width: 100%; padding: 18px; background: var(--m-blue); color: white; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 16px; box-shadow: 0 5px 20px rgba(9, 132, 227, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">MEOW<span>AIR</span> ULTRA GDS v7.0</a>
    <div class="fx-rate"><i class="fas fa-coins"></i> 实时汇率: 1 MYR ≈ 1.53 CNY | 1 USD ≈ 4.73 MYR</div>
</nav>

<div class="wrapper">
    <aside>
        <div class="card">
            <div class="trip-mode">
                <button class="t-btn active" onclick="setMode('oneWay', this)">单程</button>
                <button class="t-btn" onclick="setMode('roundTrip', this)">往返 (省 15%)</button>
            </div>
            
            <div class="input-box">
                <label>出发枢纽 (全球节点)</label>
                <select id="from">
                    <option value="KUL">Kuala Lumpur (KUL) - 马来西亚</option>
                    <option value="LHR">London Heathrow (LHR) - 英国</option>
                    <option value="JFK">New York (JFK) - 美国</option>
                    <option value="SIN">Singapore (SIN) - 新加坡</option>
                </select>
            </div>
            <div class="input-box">
                <label>目的坐标</label>
                <select id="to">
                    <option value="PVG" selected>Shanghai (PVG) - 中国</option>
                    <option value="HND">Tokyo Haneda (HND) - 日本</option>
                    <option value="CDG">Paris (CDG) - 法国</option>
                    <option value="SYD">Sydney (SYD) - 澳大利亚</option>
                </select>
            </div>
            <div class="input-box">
                <label>出发日期</label>
                <input type="date" id="dDate" value="2026-04-10">
            </div>
            <div class="input-box" id="rBox" style="display:none;">
                <label>返程日期</label>
                <input type="date" id="rDate" value="2026-04-17">
            </div>
            
            <button class="btn-hunt" onclick="globalSearch()">🚀 拦截全球实时报价</button>
        </div>

        <div class="card" style="background: #fff5e6; border: 1px dashed var(--m-orange); text-align: center;">
            <span id="meow-bot" style="font-size:50px;">🐱</span>
            <p id="speech" style="font-size:12px; color:#d35400;">“主人，我已连线全球 12 个数据中心喵！”</p>
            <div id="visa-radar" style="font-size: 11px; color: var(--m-blue); font-weight: bold;"></div>
        </div>
    </aside>

    <main>
        <div class="card" style="height: 280px;">
            <canvas id="priceChart"></canvas>
        </div>

        <div id="results">
            <div style="text-align:center; padding:100px; color:#ccc;">
                <i class="fas fa-globe-americas fa-spin" style="font-size:50px; margin-bottom:15px;"></i>
                <p>等待操作员下达全球 GDS 扫描指令...</p>
            </div>
        </div>
    </main>
</div>

<script>
    let mode = 'oneWay';
    let chart;
    const meowSound = new Audio("https://actions.google.com/sounds/v1/animals/domestic_cat_meow.ogg");

    // 核心：全球比价网址库
    const LINKS = [
        { name: "Trip.com", url: "https://www.trip.com" },
        { name: "Skyscanner", url: "https://www.skyscanner.com" },
        { name: "Expedia", url: "https://www.expedia.com" },
        { name: "Google Flights", url: "https://www.google.com/travel/flights" },
        { name: "AirAsia", url: "https://www.airasia.com" },
        { name: "Kayak", url: "https://www.kayak.com" }
    ];

    function setMode(m, btn) {
        mode = m;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('rBox').style.display = (m === 'roundTrip' ? 'block' : 'none');
        checkVisa();
    }

    function checkVisa() {
        const to = document.getElementById('to').value;
        const radar = document.getElementById('visa-radar');
        if(to === 'PVG') radar.innerText = "📡 签证雷达：中国对马/英/法持普通护照者免签！";
        else radar.innerText = "📡 签证雷达：请务必检查目的地电子签策略。";
    }

    function globalSearch() {
        const results = document.getElementById('results');
        const speech = document.getElementById('speech');
        const bot = document.getElementById('meow-bot');
        
        bot.innerText = "🧐";
        speech.innerText = "正在穿透 Sabre 和 Amadeus 全球分销系统协议...";
        results.innerHTML = "<div style='text-align:center; padding:80px;'><i class='fas fa-sync fa-spin' style='font-size:30px;'></i><br>正在拦截全球数据节点报价...</div>";

        setTimeout(() => {
            bot.innerText = "😻";
            speech.innerText = "“喵！已拦截到 24 条低价航线，Trip.com 价格暂时领跑！”";
            meowSound.play();
            
            const flights = [
                { provider: "Trip.com", base: 790, tags: ["比价冠军", "含23kg托运"], time: "10:00 - 15:30" },
                { provider: "AirAsia", base: 840, tags: ["廉航巨头", "不含行李"], time: "08:15 - 13:45" },
                { provider: "British Airways", base: 1350, tags: ["五星全服务", "优质餐饮"], time: "11:00 - 16:30" }
            ];

            results.innerHTML = flights.map(f => {
                const finalPrice = mode === 'roundTrip' ? Math.floor(f.base * 1.75) : f.base;
                return `
                <div class="flight-card">
                    <div class="f-header" onclick="toggleTimeline(this)">
                        <div class="airline-name">${f.provider}</div>
                        <div style="text-align:center;">
                            <b>${f.time}</b><br>
                            <span style="font-size:11px; color:#999;">${mode === 'roundTrip' ? '🔄 往返' : '➡️ 单程'} | 飞行 5h 30m</span>
                        </div>
                        <div style="text-align:center;">
                            ${f.tags.map(t => `<span style="font-size:10px; background:#eee; padding:2px 6px; border-radius:4px; margin:2px;">${t}</span>`).join('')}
                        </div>
                        <div class="price-tag">
                            <div class="price-val">RM ${finalPrice}</div>
                            <small style="font-size:10px; color:var(--m-green);">已选最优节点</small>
                        </div>
                    </div>
                    <div class="timeline">
                        <div class="step"><b>T-3h</b> 抵达起飞机场 (Dormestic/Intl Terminal)</div>
                        <div class="step"><b>T-45m</b> 登机闸口关闭</div>
                        <div class="step"><b>Flight</b> ${f.provider} 机组为您服务</div>
                        <div class="step"><b>Arrival</b> 顺利抵达目的地并领取行李</div>
                        <div class="links-grid">
                            ${LINKS.map(l => `<a href="${l.url}" target="_blank" class="ext-link">${l.name} 直接买</a>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            updateChart([950, 1100, 850, flights[0].base]);
        }, 1500);
    }

    function toggleTimeline(header) {
        const t = header.nextElementSibling;
        t.style.display = (t.style.display === 'block' ? 'none' : 'block');
    }

    function updateChart(dataPoints) {
        const ctx = document.getElementById('priceChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['前天', '昨天', '今天', '预测'],
                datasets: [{
                    label: '全球节点最低价波动 (RM)',
                    data: dataPoints,
                    borderColor: '#ff9f43',
                    backgroundColor: 'rgba(255, 159, 67, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    window.onload = () => {
        const d = new Date();
        document.getElementById('dDate').value = d.toISOString().split('T')[0];
        updateChart([1000, 950, 1200, 800]);
        checkVisa();
    };
</script>
</body>
</html>
